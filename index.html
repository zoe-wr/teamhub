<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* 引入現代科技感字體 */
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
    
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: #f8fafc;
      /* 背景加入細微的科技放射光 */
      background-image: 
        radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.05) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.05) 0px, transparent 50%);
    }

    /* 磨砂玻璃效果 */
    .glass-effect {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    /* 側邊欄影子 */
    .nav-shadow { box-shadow: 10px 0 30px -15px rgba(0,0,0,0.05); }

    /* 科技感卡片懸停效果 */
    .tech-card {
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .tech-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      border-color: #3b82f6;
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* 進場動畫 */
    .animate-in { 
      animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
    }
    @keyframes slideIn { 
      from { opacity: 0; transform: translateY(20px); } 
      to { opacity: 1; transform: translateY(0); } 
    }

    .mono-text { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body class="text-slate-900 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const App = () => {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [user, setUser] = useState({ name: '載入中...', email: '系統認證中' });
      const [wipData, setWipData] = useState([]);
      const [isLoading, setIsLoading] = useState(false);

      useEffect(() => {
        if (typeof google !== 'undefined') {
            google.script.run.withSuccessHandler(setUser).getUserInfo();
        } else {
          setUser({ name: 'Zoe', email: 'zoe.wr@meshplus.com.tw' });
        }
      }, []);

      useEffect(() => {
        if (activeTab === 'kanban') loadWipData();
      }, [activeTab]);

      useEffect(() => { 
        const timer = setTimeout(() => {
          if (window.lucide) lucide.createIcons(); 
        }, 150); // 150ms 的延遲確保 React 已完成 DOM 更新
        return () => clearTimeout(timer);
      }, [activeTab, user, wipData, isLoading]);

      const loadWipData = () => {
        setIsLoading(true);
        if (typeof google !== 'undefined') {
          google.script.run.withSuccessHandler((data) => {
            setWipData(data || []);
            setIsLoading(false);
          }).getWipData();
        } else {
          setTimeout(() => {
            setWipData([]);
            setIsLoading(false);
          }, 1000);
        }
      };

      // 優化後的側邊欄按鈕
      const SidebarItem = ({ id, icon, label }) => (
        <button 
          onClick={() => setActiveTab(id)} 
          className={`w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all duration-300 group ${
            activeTab === id 
            ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' 
            : 'text-slate-500 hover:bg-white hover:text-slate-900'
          }`}
        >
          <i data-lucide={icon} className={`w-5 h-5 transition-transform group-hover:scale-110`}></i>
          <span className="font-bold text-[13px] tracking-wide">{label}</span>
          {activeTab === id && <div className="ml-auto w-1.5 h-1.5 rounded-full bg-white animate-pulse"></div>}
        </button>
      );

      // 優化後的資源卡片
      const ResourceCard = ({ title, desc, link, icon, color }) => (
        <a 
          href={link} 
          target="_blank" 
          className="group relative p-8 bg-white/60 glass-effect border rounded-[2.5rem] tech-card flex flex-col justify-between overflow-hidden"
        >
          <div className="flex justify-between items-start mb-6">
            <div 
              className="w-14 h-14 rounded-2xl flex items-center justify-center transition-colors shadow-sm"
              style={{ backgroundColor: `${color}10`, color: color }}
            >
              <i data-lucide={icon} className="w-7 h-7"></i>
            </div>
            <div className="p-2 rounded-full bg-slate-50 text-slate-300 group-hover:text-blue-600 group-hover:bg-blue-50 transition-all duration-300">
              <i data-lucide="arrow-up-right" className="w-5 h-5"></i>
            </div>
          </div>
          
          <div>
            <h3 className="font-extrabold text-xl text-slate-800 mb-2 tracking-tight group-hover:text-blue-600 transition-colors">
              {title}
            </h3>
            <p className="text-sm text-slate-500 leading-relaxed line-clamp-2">{desc}</p>
          </div>

          {/* 底部裝飾條 */}
          <div 
            className="absolute bottom-0 left-0 h-1.5 transition-all duration-500 w-0 group-hover:w-full opacity-60"
            style={{ backgroundColor: color }}
          ></div>
        </a>
      );

      const PageHeader = ({ title, icon, colorClass = "text-slate-900" }) => (
        <div className="mb-12 animate-in">
          <div className={`inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white shadow-sm border border-slate-100 text-[10px] font-extrabold uppercase tracking-[0.15em] mb-4 ${colorClass.replace('text-', 'text-opacity-70 text-')}`}>
            <i data-lucide={icon} className="w-3 h-3"></i>
            {activeTab} module
          </div>
          <h2 className={`text-4xl font-extrabold tracking-tight ${colorClass}`}>
            {title}
          </h2>
        </div>
      );

      return (
        <div className="flex min-h-screen">
          {/* Sidebar */}
          <aside className="w-72 fixed h-full flex flex-col p-8 glass-effect nav-shadow z-30 hidden lg:flex border-r border-slate-200/50">
            <div className="mb-12 px-2 flex items-center gap-3">
              <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
                 <i data-lucide="layers" className="text-white w-6 h-6"></i>
              </div>
              <div>
                <h1 className="text-xl font-extrabold text-slate-900 tracking-tight">TEAM MATT</h1>
                <p className="text-[9px] mono-text text-slate-400 font-medium uppercase tracking-widest">Digital Hub v2.0</p>
              </div>
            </div>
            
            <nav className="space-y-2 flex-1 no-scrollbar overflow-y-auto">
              <SidebarItem id="dashboard" icon="layout-grid" label="資源總覽" />
              <SidebarItem id="archives" icon="archive" label="專案總檔" />
              <div className="my-6 border-t border-slate-100 mx-2"></div>
              <SidebarItem id="trends" icon="trending-up" label="Motix Lab年度報告" />
              <SidebarItem id="sky" icon="cloud-lightning" label="Sky Service" />
              <div className="my-6 border-t border-slate-100 mx-2"></div>
              <SidebarItem id="ai" icon="cpu" label="AI Studio" />
              <SidebarItem id="design" icon="vibrate" label="設計素材" />
              <SidebarItem id="sharefile" icon="send" label="傳檔案給客戶" />
            </nav>

            <div className="mt-8 pt-6 border-t border-slate-100 flex items-center gap-4">
              <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-slate-200 to-slate-100 flex items-center justify-center text-slate-600 font-bold text-xs shadow-inner">
                {user.name.charAt(0)}
              </div>
              <div className="overflow-hidden">
                <p className="text-xs font-bold text-slate-800 truncate">{user.name}</p>
                <p className="text-[10px] mono-text text-slate-400 truncate">{user.email}</p>
              </div>
            </div>
          </aside>

          {/* Main Content */}
          <main className="flex-1 lg:ml-72 p-8 md:p-12 lg:p-20 min-w-0">
            
            {/* Dashboard */}
            {activeTab === 'dashboard' && (
              <section className="max-w-6xl">
                <header className="mb-16 animate-in">
                  <div className="flex items-center gap-2 text-blue-600 font-bold text-xs uppercase tracking-[0.2em] mb-4">
                    <span className="w-8 h-[2px] bg-blue-600"></span>
                    Overview
                  </div>
                  <h2 className="text-5xl md:text-6xl font-extrabold text-slate-900 tracking-tight leading-tight">
                    Hello, <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-500">{user.name}</span>!
                  </h2>
                </header>

                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8 animate-in" style={{ animationDelay: '0.1s' }}>
                  <ResourceCard title="WIP 專案表單" desc="即時追蹤所有專案節點，確保進度如期執行。" link="https://docs.google.com/document/d/13X-zDCXL8h9CDFxTyh_d1v9ySKQZ7I0Rh0_uKfTbJxc/edit?usp=sharing" icon="table" color="#2563eb" />
                  <ResourceCard title="常用表單目錄" desc="各類品牌文件、標準 Logo 資源與資產。" link="https://drive.google.com/drive/folders/1ky_FAEbE3krBfJPQWmX8tWoKv6py17nu" icon="check-square" color="#f59e0b" />
                   <ResourceCard title="Abby小教室" desc="Google課程報名用ID、SKYURL設定、競品投資量。" link="https://drive.google.com/drive/folders/1IEr2eLfw3ZMharivnPtVWwHiRWbCumIS?usp=drive_link" icon="graduation-cap" color="#06b6d4" />
                  <ResourceCard title="精選外部報告" desc="全球市場觀察、趨勢變化與產業統整分析。" link="https://drive.google.com/drive/folders/1Y019QIjAWXj3oN6mcNBIsDOZfqRHjooS" icon="trending-up" color="#10b981" />
                </div>
              </section>
            )}

            {/* 專案總檔 Tab */}
            {activeTab === 'archives' && (
              <section className="max-w-6xl">
                <PageHeader title="專案總檔目錄" icon="archive" colorClass="text-rose-600" />
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 animate-in" style={{ animationDelay: '0.1s' }}>
                  <ResourceCard title="2026 專案總檔" desc="2026 年度所有執行專案與規劃合輯。" link="https://drive.google.com/drive/folders/1oRkLribkgDteDNq5MINi6r1GqodpLshr" icon="folder-open" color="#e11d48" />
                  <ResourceCard title="2025 專案總檔" desc="2025 年度所有已執行之專案備份。" link="https://drive.google.com/drive/folders/1O-lbWY4iNpsgVtgeOWNAn13AqMMq2xJQ" icon="history" color="#fb7185" />
                </div>
              </section>
            )}

            {/* Motix Lab 年度報告 Tab */}
            {activeTab === 'trends' && (
              <section className="max-w-6xl">
                <PageHeader title="年度產業報告專區" icon="line-chart" colorClass="text-indigo-600" />
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in">
                  <ResourceCard title="報告大綱" desc="2025-2026 年度報告結構與草案。" link="https://docs.google.com/presentation/d/1M2sjjVu95Ja0axNBNreZG19C_ChaNuIQ/edit" icon="layout" color="#6366f1" />
                  <ResourceCard title="數據產出" desc="趨勢觀察數據、分析資料存檔。" link="https://drive.google.com/drive/folders/18vaN4LTJlwhjZsvkIG1HcLo5Q3Ek2XPE" icon="database" color="#4f46e5" />
                  <ResourceCard title="專家訪談錄" desc="專家質性訪談內容與問題規劃。" link="https://docs.google.com/document/d/1-97kdCVlmzPNtsx6K4-XVpP_EuXZfgs-nWNaTPKU8OA/edit" icon="mic" color="#4338ca" />
                  <ResourceCard 
                    title="數據條件" desc="產業鎖定需求彙整" link="https://drive.google.com/drive/folders/15q6oaZcy4QsfjlLQQNBgAFJo1V9cyMhx?usp=drive_link" icon="code" color="#6366f1" />
                </div>
              </section>
            )}

            {/* Sky Service */}
            {activeTab === 'sky' && (
              <section className="max-w-6xl">
                <PageHeader title="Sky Service 資源庫" icon="cloud-lightning" colorClass="text-blue-600" />
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in">
                  <ResourceCard title="Sales Kit" desc="Sky Service 提案必備工具包。" link="https://drive.google.com/drive/folders/1RlVMK8Hm56-SeGTkKIfKy34U33X5SWD4" icon="briefcase" color="#3b82f6" />
                  <ResourceCard title="Showcase" desc="案例展示與執行成效。" link="https://drive.google.com/drive/folders/19T4kEjV4nKSxm1f0n50qJiEz-LprAL0R" icon="eye" color="#6366f1" />
                  <ResourceCard title="Roadmap" desc="專案任務進度與長期戰略規劃。" link="https://docs.google.com/spreadsheets/d/1gmITekY41crT5x10cUhq8gi6mGKVTX5r0Q-dMj5B5Yc/edit?usp=sharing" icon="milestone" color="#06b6d4" />
                </div>
              </section>
            )}

            {/* AI Studio */}
            {activeTab === 'ai' && (
              <section className="max-w-6xl">
                <PageHeader title="AI Studio 實驗室" icon="cpu" colorClass="text-purple-600" />
                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8 animate-in">
                  <ResourceCard title="AI Image Studio" desc="支援AI延伸圖片背景與尺寸調整。" link="https://aistudio.google.com/apps/drive/1SdyoQDoM_PFaQVO1dWmMg6iTFptAaqor?fullscreenApplet=true&showPreview=true&showAssistant=true" icon="sparkles" color="#4f46e5" />
                  <ResourceCard title="會議逐字稿系統" desc="AI 自動化語音轉文字與摘要提取。" link="https://aistudio.google.com/apps/drive/1FXWQo1nianJnX27m6cbKpr7sbECkr6Xw?fullscreenApplet=true&showPreview=true&showAssistant=true" icon="target" color="#0ea5e9" />
                  <ResourceCard title="NotebookLM 編輯" desc="上傳 PDF → 智慧編輯文字 → 下載。" link="https://notebooklm.10xboost.org/" icon="book-marked" color="#9333ea" />
                  <ResourceCard title="Pro PNG Resizer" desc="調整圖片尺寸。" link="https://aistudio.google.com/apps/drive/11yY3AYiSx0lvakVNbqfuME5wMWvjZwF0" icon="book-marked" color="#9333ea" />
                </div>
              </section>
            )}

            {/* Design Tools */}
            {activeTab === 'design' && (
              <section className="max-w-6xl">
                <PageHeader title="設計模板與資源" icon="vibrate" colorClass="text-emerald-700" />
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 animate-in">
                  <ResourceCard title="PPTBIZCAM" desc="高質感韓系商務 PPT 模板。" link="https://pptbizcam.co.kr/" icon="file-text" color="#059669" />
                  <ResourceCard title="HiSlide" desc="專業簡報素材與圖表資源。" link="https://hislide.io/" icon="layout" color="#047857" />
                  <ResourceCard title="Google Icons" desc="Material Symbols 官方圖示庫。" link="https://fonts.google.com/icons" icon="smile" color="#10b981" />
                </div>
              </section>
            )}

             {/* 傳檔案給客戶 Tab */}
            {activeTab === 'sharefile' && (
              <section className="max-w-6xl">
                <PageHeader title="傳檔案給客戶工具" icon="share-2" colorClass="text-yellow-600" />
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in">
                  <ResourceCard title="FileCheetah" desc="博報堂ＤＹ集團使用的線上服務。" link="https://filecheetah.jp/" icon="send" color="#f97316" />
                  <ResourceCard title="共用雲端硬碟" desc="使用規則請看 =讀我=.txt" link="https://drive.google.com/drive/folders/1Y2HbDUIWBRs1xsSn01htf0x-RdHwgMq2?usp=drive_link" icon="folder-up" color="#10b981" />
                </div>
              </section>
            )}

          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
